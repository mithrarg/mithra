<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screening System - Premium 3D UI</title>
    <style>
        :root {
            --bg-frame-gradient-start: #fff0f3;
            --bg-frame-gradient-end: #ffe4eb;
            --text-dark: #2d0c16;
            --accent-magenta: #e91e63;
            --accent-magenta-deep: #c2185b;
            --clay-surface: #ffffff;
            --clay-shadow-soft: rgba(233, 30, 99, 0.18);
            --inner-glow: rgba(255, 255, 255, 1);
            --shadow-3d: rgba(216, 27, 96, 0.25);
            --bar-clay: #f3ebf0;
            
            /* UPDATED: Seamless premium toy color variables (no dark borders) */
            --toy-lens-rim: #3a3d46;
            --toy-handle-color: #f06292;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: #0b0305;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Phone Frame container */
        .phone-frame {
            width: 375px;
            height: 812px;
            background: linear-gradient(180deg, var(--bg-frame-gradient-start) 0%, var(--bg-frame-gradient-end) 100%);
            border-radius: 44px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.75);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 24px 28px;
            justify-content: space-between;
        }

        /* Top Bar Status System */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dark);
            font-size: 14px;
            font-weight: 600;
            padding: 0 10px;
            opacity: 0.9;
        }

        .status-icons {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .icon-signal { 
            display: flex; 
            gap: 2px; 
            align-items: flex-end; 
            height: 10px; 
        }
        .icon-signal span { 
            width: 3px; 
            background: var(--text-dark); 
            border-radius: 1px;
        }
        .icon-signal span:nth-child(1) { height: 4px; }
        .icon-signal span:nth-child(2) { height: 6px; }
        .icon-signal span:nth-child(3) { height: 8px; }
        .icon-signal span:nth-child(4) { height: 10px; }

        .icon-wifi { 
            width: 16px; 
            height: 12px; 
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--text-dark);
            position: relative;
        }
        .icon-wifi::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: -2px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--text-dark);
        }
        .icon-battery { width: 22px; height: 11px; border: 1.5px solid var(--text-dark); border-radius: 4px; position: relative; }
        .icon-battery::after { content: ''; position: absolute; left: 2px; top: 1.5px; width: 13px; height: 5px; background: var(--text-dark); border-radius: 1px; }

        /* Typography Mapping */
        .heading-section {
            margin-top: 22px;
            padding-left: 4px;
        }

        .welcome-label {
            color: var(--text-dark);
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 6px;
            opacity: 0.8;
        }

        .main-title {
            color: var(--accent-magenta);
            font-size: 42px;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 22px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-dark);
            font-size: 16px;
            line-height: 1.45;
            opacity: 0.75;
        }

        /* 3D Perspective Canvas Workspace */
        .scene-wrapper {
            position: relative;
            width: 100%;
            height: 380px;
            margin: 12px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1400px;
        }

        /* Main Note Base Card */
        .document-note-base {
            position: relative;
            width: 195px;
            height: 260px;
            background: #f06292;
            border-radius: 28px;
            transform: rotateX(14deg) rotateY(14deg) rotateZ(-3deg); 
            box-shadow: 22px 28px 45px var(--shadow-3d);
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 4;
        }

        /* Volumetric 3D Bevel Edge Layer on Left Side */
        .document-note-base::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 6px;
            left: -6px;
            background: #d81b60;
            border-radius: 28px;
            z-index: -1;
        }

        /* Premium Claymorphic Surface */
        .document-note-top {
            position: absolute;
            width: 100%;
            height: 100%;
            top: -6px;
            left: -2px;
            background: var(--clay-surface);
            border-radius: 28px;
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 
                inset 4px -4px 12px rgba(0,0,0,0.06),
                inset -5px 5px 12px var(--inner-glow);
        }

        /* Header profile badge inside note card */
        .note-header {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .profile-badge {
            width: 54px;
            height: 54px;
            background: var(--accent-magenta);
            border-radius: 50%;
            position: relative;
            box-shadow: 
                0 6px 14px rgba(233, 30, 99, 0.35),
                inset -4px -4px 8px rgba(0,0,0,0.2),
                inset 4px 4px 8px rgba(255,255,255,0.4);
            flex-shrink: 0;
        }
        
        /* Person Inner Circle silhouette details */
        .profile-badge::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: var(--clay-surface);
            border-radius: 50%;
            top: 11px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .profile-badge::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 13px;
            background: var(--clay-surface);
            border-radius: 14px 14px 0 0;
            bottom: 9px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset 1px 1px 2px rgba(0,0,0,0.1);
        }

        .header-text-bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .mock-bar {
            height: 10px;
            background: var(--bar-clay);
            border-radius: 6px;
            box-shadow: 
                inset 1px 1px 2px rgba(0,0,0,0.08), 
                0 1px 2px rgba(255,255,255,0.8);
        }
        .mock-bar.b1 { width: 55px; }
        .mock-bar.b2 { width: 70px; }
        .mock-bar.b3 { width: 45px; }

        .note-body-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 4px;
        }

        .list-item-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .square-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-magenta);
            border-radius: 50%;
            box-shadow: 0 2px 4px rgba(233, 30, 99, 0.3);
        }

        .body-bar {
            height: 10px;
            background: var(--bar-clay);
            border-radius: 6px;
            width: 85px;
            box-shadow: 
                inset 1px 1px 2px rgba(0,0,0,0.08), 
                0 1px 2px rgba(255,255,255,0.8);
        }

        /* 3D File Box Container */
        .bg-folder-3d {
            position: absolute;
            left: 12px;
            bottom: 115px;
            width: 68px;
            height: 54px;
            background: #f06292;
            border-radius: 14px;
            box-shadow: 
                -12px 16px 28px rgba(233, 30, 99, 0.2),
                inset -3px -3px 7px rgba(0,0,0,0.15),
                inset 2px 2px 4px rgba(255,255,255,0.3);
            transform: rotateX(14deg) rotateY(-14deg) rotateZ(3deg) translateZ(-5px);
            z-index: 2;
        }
        
        .bg-folder-3d::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 8px;
            width: 26px;
            height: 8px;
            background: #f06292;
            border-radius: 4px 4px 0 0;
            box-shadow: inset 1px 2px 2px rgba(255,255,255,0.2);
        }

        /* 3D Vertical File Sheets Layering */
        .folder-files-container {
            position: absolute;
            top: -28px;
            left: 12px;
            display: flex;
            gap: 6px;
            z-index: -1;
        }

        .long-file-sheet {
            width: 16px;
            height: 44px;
            background: var(--clay-surface);
            border-radius: 4px;
            box-shadow: 
                -4px 4px 8px rgba(0,0,0,0.1),
                inset -1px -1px 3px rgba(0,0,0,0.05);
            padding: 6px 3px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transform: rotateZ(-2deg);
        }

        .long-file-sheet.offset {
            height: 50px;
            transform: translateY(-8px) rotateZ(3deg);
            background: #fff5f7;
            box-shadow: 
                -5px 5px 10px rgba(0,0,0,0.12),
                inset -1px -1px 3px rgba(0,0,0,0.05);
        }

        .file-line {
            width: 100%;
            height: 2px;
            background: #f48fb1;
            border-radius: 1px;
        }

        /* Modular Soft 3D Floating Boxes Frame */
        .floating-tile-3d {
            position: absolute;
            background: var(--clay-surface);
            border-radius: 16px;
            box-shadow: 
                -12px 16px 26px var(--clay-shadow-soft),
                inset -3px -3px 6px rgba(0,0,0,0.02),
                inset 3px 3px 6px var(--inner-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 6;
            transition: transform 0.5s ease;
        }

        .tile-lower-left {
            width: 48px; 
            height: 48px; 
            left: 34px;
            bottom: 48px;
            border-radius: 12px;
            transform: rotateX(12deg) rotateY(-10deg) rotateZ(1deg) translateZ(45px);
        }

        .tile-upper-right {
            width: 56px;
            height: 56px;
            right: 26px;
            top: 52px;
            transform: rotateX(10deg) rotateY(-20deg) rotateZ(8deg) translateZ(15px);
        }

        .two-persons-wrapper {
            display: flex;
            position: relative;
            width: 32px;
            height: 22px;
            justify-content: center;
            align-items: flex-end;
            transform: scale(0.75); 
        }

        .mini-avatar {
            width: 12px;
            height: 12px;
            background: var(--accent-magenta);
            border-radius: 50%;
            position: absolute;
        }
        
        .mini-avatar::after {
            content: '';
            position: absolute;
            bottom: -7px;
            left: -3px;
            width: 18px;
            height: 8px;
            background: var(--accent-magenta);
            border-radius: 50% 50% 0 0;
        }

        .mini-avatar.p1 {
            left: 1px;
            z-index: 2;
            box-shadow: 1px 0 3px rgba(0,0,0,0.1);
        }

        .mini-avatar.p2 {
            right: 1px;
            background: #ec407a;
            z-index: 1;
            transform: scale(0.85);
        }
        .mini-avatar.p2::after {
            background: #ec407a;
        }
        
        .profile-group-icon {
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }
        .icon-bar {
            width: 6px;
            background: var(--accent-magenta);
            border-radius: 2px;
        }
        .icon-bar.h1 { height: 12px; }
        .icon-bar.h2 { height: 22px; }
        .icon-bar.h3 { height: 16px; }

        /* Magnifying Glass Global Transform Canvas Component */
        .magnifying-glass-container {
            position: absolute;
            right: -24px; 
            bottom: 35px;
            width: 130px;
            height: 130px;
            z-index: 15;
            pointer-events: none;
            transform: translateZ(65px);
            transition: transform 0.5s ease;
        }

        /* UPDATED: Perfected 3D Clay Lens Rim (Removed stark dark borders, light soft back borders) */
        .lens-circle {
            width: 86px;
            height: 86px;
            border: 11px solid var(--toy-lens-rim);
            background: rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 
                10px 14px 24px rgba(233, 30, 99, 0.16),
                inset -3px 3px 6px rgba(255, 255, 255, 0.6),
                inset 3px -3px 6px rgba(0, 0, 0, 0.15); 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Light glossy sheen reflection across the toy glass */
        .lens-circle::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 8px;
            width: 40px;
            height: 20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50% / 100% 100% 0 0;
            transform: rotate(-30deg);
        }

        /* UPDATED: Full Toy Color Handle with Volumetric Shadows (No dark backing border) */
        .lens-stick-handle {
            position: absolute;
            top: 66px;
            left: 66px;
            width: 22px;
            height: 50px;
            background: linear-gradient(135deg, #ff5c93 0%, var(--toy-handle-color) 50%, #d81b60 100%);
            border-radius: 11px;
            transform-origin: top left;
            transform: rotate(-45deg);
            box-shadow: 
                6px 10px 18px rgba(233, 30, 99, 0.2),
                inset 2px 2px 4px rgba(255, 255, 255, 0.5),
                inset -2px -2px 4px rgba(0, 0, 0, 0.2);
            padding: 0; 
        }

        /* Pink inner validation checkmark asset */
        .pink-checkmark {
            width: 14px;
            height: 24px;
            border: solid var(--accent-magenta);
            border-width: 0 5.5px 5.5px 0;
            transform: rotate(40deg) translate(-1px, -2px);
            filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.15));
        }

        /* Interactive 3D Hover Effects Animations */
        .scene-wrapper:hover .document-note-base {
            transform: rotateX(11deg) rotateY(8deg) rotateZ(-1deg) translateY(-5px);
        }
        .scene-wrapper:hover .magnifying-glass-container {
            transform: translateZ(90px) scale(1.05) translate(2px, -2px);
        }
        .scene-wrapper:hover .bg-folder-3d {
            transform: rotateX(10deg) rotateY(-10deg) rotateZ(2deg) translateY(-3px);
        }
        .scene-wrapper:hover .tile-lower-left { transform: rotate(-4deg) translateY(1px) translateZ(55px) scale(1.05); }
        .scene-wrapper:hover .tile-upper-right { transform: rotate(14deg) translateY(-3px); }

        /* Footer layout controls module */
        .footer-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 26px;
            margin-bottom: 8px;
            width: 100%;
        }

        /* 3D Button container layout properties */
        .push-button-3d-wrapper {
            position: relative;
            background: transparent;
            border: none;
            cursor: pointer;
            outline: none;
            width: 100%;
            height: 69px; 
            display: block;
            text-decoration: none;
        }

        .btn-bottom-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            border-radius: 32px;
            background: rgba(233, 30, 99, 0.35);
            transform: translateY(5px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
        }

        .btn-bevel-edge {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            border-radius: 32px;
            background: linear-gradient(
                to left,
                #c2185b 0%,
                var(--accent-magenta) 12%,
                var(--accent-magenta) 88%,
                #d81b60 100%
            );
        }

        .btn-top-surface {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            position: relative;
            width: 100%;
            height: 64px;
            border-radius: 32px;
            background: var(--accent-magenta);
            color: #ffffff;
            font-size: 20px;
            font-weight: 600;
            transform: translateY(-6px);
            transition: transform 600ms cubic-bezier(.3, .7, .4, 1);
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.4);
        }

        .btn-top-surface .arrow-symbol {
            font-size: 24px;
            transition: transform 250ms ease;
        }

        /* Button Transforms triggers */
        .push-button-3d-wrapper:hover .btn-top-surface {
            transform: translateY(-8px);
            transition: transform 250ms cubic-bezier(.3, .7, .4, 1);
        }
        .push-button-3d-wrapper:hover .btn-bottom-shadow {
            transform: translateY(7px);
            transition: transform 250ms cubic-bezier(.3, .7, .4, 1);
        }
        .push-button-3d-wrapper:hover .arrow-symbol {
            transform: translateX(6px);
        }

        .push-button-3d-wrapper:active .btn-top-surface {
            transform: translateY(-2px);
            transition: transform 35ms;
        }
        .push-button-3d-wrapper:active .btn-bottom-shadow {
            transform: translateY(2px);
            transition: transform 35ms;
        }

        /* Carousel Progress Dots */
        .indicator-dots {
            display: flex;
            gap: 9px;
            align-items: center;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: rgba(233, 30, 99, 0.2);
            transition: all 0.3s ease;
        }

        .indicator-dot.active {
            background-color: var(--accent-magenta);
            transform: scale(1.2);
        }
        
        .indicator-dot.hollow {
            background-color: transparent;
            border: 1.5px solid var(--accent-magenta);
        }
    </style>
</head>
<body>

    <!-- Smartphone Frame Context -->
    <div class="phone-frame">
        
        <!-- Native Top Status Bar -->
        <div class="status-bar">
            <div class="time">9:41</div>
            <div class="status-icons">
                <div class="icon-signal">
                    <span></span><span></span><span></span><span></span>
                </div>
                <div class="icon-wifi"></div>
                <div class="icon-battery"></div>
            </div>
        </div>

        <!-- System Wording Setup -->
        <div class="heading-section">
            <p class="welcome-label">Welcome to</p>
            <h1 class="main-title">Resume<br>Screening<br>System</h1>
            <p class="subtitle">Smart screening.<br>Better hiring.</p>
        </div>

        <!-- 3D Graphic Environment Canvas Layout -->
        <div class="scene-wrapper">
            
            <!-- 3D Folder Element with custom lines -->
            <div class="bg-folder-3d">
                <div class="folder-files-container">
                    <div class="long-file-sheet">
                        <div class="file-line"></div>
                        <div class="file-line"></div>
                    </div>
                    <div class="long-file-sheet offset">
                        <div class="file-line"></div>
                        <div class="file-line"></div>
                        <div class="file-line"></div>
                    </div>
                </div>
            </div>
            
            <!-- Small Box Component -->
            <div class="floating-tile-3d tile-lower-left">
                <div class="two-persons-wrapper">
                    <div class="mini-avatar p1"></div>
                    <div class="mini-avatar p2"></div>
                </div>
            </div>

            <!-- Central Main Note Card -->
            <div class="document-note-base">
                <div class="document-note-top">
                    
                    <div class="note-header">
                        <div class="profile-badge"></div>
                        <div class="header-text-bars">
                            <div class="mock-bar b1"></div>
                            <div class="mock-bar b2"></div>
                            <div class="mock-bar b3"></div>
                        </div>
                    </div>
                    
                    <div class="note-body-list">
                        <div class="list-item-row"><div class="square-dot"></div><div class="body-bar"></div></div>
                        <div class="list-item-row"><div class="square-dot"></div><div class="body-bar"></div></div>
                        <div class="list-item-row"><div class="square-dot"></div><div class="body-bar"></div></div>
                        <div class="list-item-row"><div class="square-dot"></div><div class="body-bar"></div></div>
                        <div class="list-item-row"><div class="square-dot"></div><div class="body-bar"></div></div>
                    </div>

                    <!-- Overlapping 3D Clay Magnifying Glass Element -->
                    <div class="magnifying-glass-container">
                        <div class="lens-circle">
                            <div class="pink-checkmark"></div>
                        </div>
                        <div class="lens-stick-handle"></div>
                    </div>
                    
                </div>
            </div>

            <!-- Small Box design (Upper Right background decoration element) -->
            <div class="floating-tile-3d tile-upper-right">
                <div class="profile-group-icon">
                    <div class="icon-bar h1"></div>
                    <div class="icon-bar h2"></div>
                    <div class="icon-bar h3"></div>
                </div>
            </div>
        </div>

        <!-- Controls Action System Wrapper -->
        <div class="footer-controls">
            
            <!-- FLASK UPDATED ROUTING HERE -->
            <a href="{{ url_for('second_page') }}" class="push-button-3d-wrapper">
                <div class="btn-bottom-shadow"></div>
                <div class="btn-bevel-edge"></div>
                <div class="btn-top-surface">
                    Get Started <span class="arrow-symbol">&rarr;</span>
                </div>
            </a>

            <div class="indicator-dots">
                <div class="indicator-dot active"></div>
                <div class="indicator-dot hollow"></div>
            </div>
        </div>
    </div>
</body>
</html>
