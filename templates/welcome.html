<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>Welcome - SmartScreen AI</title>
    
    <!-- Tailwind CSS Engine CDN (v4) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        /* ==========================================
           1. Core Resets & Variables
           ========================================== */
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Custom scrollbar to maintain device consistency */
        .mobile-viewport::-webkit-scrollbar {
            width: 4px;
        }
        .mobile-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .mobile-viewport::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 10px;
        }

        /* ==========================================
           2. Custom 3D Perspective & Layering
           ========================================== */
        .perspective-container { 
            perspective: 1000px; 
        }
        
        .three-d-card {
            transform-style: preserve-3d;
            transition: transform 0.2s cubic-bezier(0.25, 0.61, 0.35, 1), box-shadow 0.3s ease;
        }

        /* High-fidelity 3D layer depth translations */
        .depth-logo { transform: translateZ(40px); }
        .depth-title { transform: translateZ(25px); }
        .depth-button { transform: translateZ(20px); }

        /* ==========================================
           3. PWA Install Overlay Styles
           ========================================== */
        #install-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .install-card {
            width: 90%;
            max-width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .3);
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            border: none;
            background: transparent;
            font-size: 22px;
            cursor: pointer;
        }

        .install-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .install-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .continue-btn {
            width: 100%;
            padding: 12px;
            margin-top: 18px;
            border: none;
            border-radius: 8px;
            background: #e5e7eb;
            cursor: pointer;
            font-size: 15px;
        }

        #install-overlay-status {
            color: #666;
            margin-top: 15px;
            min-height: 18px;
            font-size: 14px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center p-4 perspective-container overflow-hidden">

    <!-- ==========================================
       PWA Install Overlay Modal
       ========================================== -->
    <div id="install-overlay">
        <div class="install-card">
            <button id="btn-install-dismiss" class="close-btn" aria-label="Dismiss installation modal">✕</button>
            <h2 class="text-xl font-bold text-slate-900 mb-2">Install SmartScreen AI</h2>
            <p class="text-slate-600 text-sm">Install this app on your home screen for a faster experience and offline support.</p>
            
            <button id="btn-install-app" class="install-btn" disabled>
                Install App
            </button>
            <button id="btn-continue-browser" class="continue-btn">
                Continue in Browser
            </button>
            
            <div id="install-overlay-status"></div>
        </div>
    </div>

    <!-- ==========================================
       Outer Device Hardware Frame
       ========================================== -->
    <div id="device-frame" class="three-d-card relative mx-auto w-[380px] h-[780px] bg-slate-950 rounded-[48px] p-3.5 shadow-[0_25px_60px_rgba(0,0,0,0.8),_inset_0_2px_4px_rgba(255,255,255,0.2)] border border-slate-800/80 hover:shadow-[0_35px_70px_rgba(99,102,241,0.25)]">
        
        <!-- Top Speaker Notch and Camera Island Component -->
        <div class="absolute top-6 left-1/2 transform -translate-x-1/2 w-32 h-6 bg-slate-950 rounded-full z-30 flex items-center justify-center gap-1.5 shadow-inner">
            <div class="w-3 h-3 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center">
                <div class="w-1 h-1 rounded-full bg-indigo-950"></div>
            </div>
            <div class="w-12 h-1 rounded-full bg-slate-800"></div>
        </div>

        <!-- Inner Mobile Screen Viewport -->
        <div class="mobile-viewport relative w-full h-full bg-slate-50 rounded-[36px] overflow-y-auto overflow-x-hidden flex flex-col justify-between pt-24 pb-6 px-6 border border-slate-950" style="transform-style: preserve-3d;">
            
            <!-- Graphic/Branding Area -->
            <div class="flex flex-col items-center text-center my-auto space-y-8" style="transform-style: preserve-3d;">
                <!-- Animated Floating Shield Icon -->
                <div class="depth-logo w-20 h-20 bg-gradient-to-tr from-indigo-600 to-violet-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-200 border border-indigo-500/30 transition-transform duration-300 hover:scale-105">
                    <svg class="w-10 h-10 text-white drop-shadow-[0_2px_4px_rgba(0,0,0,0.15)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                
                <!-- Text Header Stack -->
                <div class="space-y-3 depth-title" style="transform-style: preserve-3d;">
                    <h1 class="text-3xl font-black text-slate-950 tracking-tight">SmartScreen AI</h1>
                    <div class="w-12 h-1 bg-indigo-600 rounded-full mx-auto my-1"></div>
                    <p class="text-xs text-slate-500 max-w-[260px] font-medium leading-relaxed mx-auto pt-2">
                        Deploy machine intelligence to analyze background indicators, matrix profiles, and skill compatibility instantly.
                    </p>
                </div>
            </div>

            <!-- Interactive Navigation Area -->
            <div class="w-full space-y-4 depth-button" style="transform-style: preserve-3d;">
                <!-- Link targeting Flask /index endpoint -->
                <a href="{{ url_for('index') }}" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 active:scale-[0.97] active:shadow-inner text-white font-extrabold rounded-2xl transition-all duration-300 tracking-wider text-xs text-center shadow-lg shadow-indigo-200 block uppercase cursor-pointer border border-indigo-700/20">
                    Get Started
                </a>
                
                <!-- Bottom UI Soft Home Indicator Bar -->
                <div class="w-28 h-1 bg-slate-200 rounded-full mx-auto mt-4 shrink-0"></div>
            </div>
            
        </div>
    </div>

    <!-- ==========================================
       Javascript Logics
       ========================================== -->

    <!-- Script 1: Register Service Worker -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker
                    .register("/sw.js")
                    .then((reg) => console.log("SmartScreen AI Service Worker Registered:", reg.scope))
                    .catch((err) => console.error("Service Worker Registration Failed:", err));
            });
        }
    </script>

    <!-- Script 2: PWA Install Prompt & Overlay Interface -->
    <script>
        (() => {
            const overlay = document.getElementById("install-overlay");
            const installBtn = document.getElementById("btn-install-app");
            const statusEl = document.getElementById("install-overlay-status");
            const dismissBtn = document.getElementById("btn-install-dismiss");
            const continueBtn = document.getElementById("btn-continue-browser");

            const DISMISS_KEY = "smartscreen-install-dismissed";
            let deferredPrompt = null;

            function isStandalone() {
                return (
                    window.matchMedia("(display-mode: standalone)").matches ||
                    window.navigator.standalone === true
                );
            }

            function showOverlay() {
                overlay.style.display = "flex";
            }

            function hideOverlay() {
                overlay.style.display = "none";
            }

            // Initialization logic
            if (!isStandalone() && sessionStorage.getItem(DISMISS_KEY) !== "1") {
                showOverlay();
            }

            // Capture the install prompt event
            window.addEventListener("beforeinstallprompt", (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installBtn.disabled = false;
                console.log("Install Prompt Ready");
            });

            // Handle actual install flow
            installBtn.addEventListener("click", async () => {
                if (!deferredPrompt) {
                    statusEl.innerHTML = "One-tap install isn't available.<br>Please use your browser menu and choose <b>Install App</b>.";
                    return;
                }

                installBtn.disabled = true;
                deferredPrompt.prompt();

                const { outcome } = await deferredPrompt.userChoice;
                console.log("Install Result:", outcome);

                if (outcome === "accepted") {
                    statusEl.textContent = "Installation successful.";
                } else {
                    statusEl.textContent = "Installation cancelled.";
                    installBtn.disabled = false;
                }

                deferredPrompt = null;
            });

            window.addEventListener("appinstalled", () => {
                console.log("PWA Installed Successfully");
                hideOverlay();
                deferredPrompt = null;
            });

            // Dismiss interactions
            dismissBtn.addEventListener("click", () => {
                sessionStorage.setItem(DISMISS_KEY, "1");
                hideOverlay();
            });

            continueBtn.addEventListener("click", () => {
                sessionStorage.setItem(DISMISS_KEY, "1");
                hideOverlay();
            });
        })();
    </script>

    <!-- Script 3: 3D Device Framing Hover Effect -->
    <script>
        (() => {
            const frame = document.getElementById('device-frame');
            
            document.body.addEventListener('mousemove', (e) => {
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                
                const mouseX = e.clientX - (windowWidth / 2);
                const mouseY = e.clientY - (windowHeight / 2);
                
                const rotateX = -(mouseY / windowHeight) * 14;
                const rotateY = (mouseX / windowWidth) * 14;
                
                frame.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            document.body.addEventListener('mouseleave', () => {
                frame.style.transform = 'rotateX(0deg) rotateY(0deg)';
            });
        })();
    </script>

</body>
</html>
