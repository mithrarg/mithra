<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Screener (Mobile App Interface)</title>
    <!-- Tailwind CSS Engine CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth transition utility for structural 3D scaling */
        .perspective-container {
            perspective: 1000px;
        }
        .3d-card {
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }
        /* Custom scrollbar to keep the mobile UI clean */
        .mobile-viewport::-webkit-scrollbar {
            width: 4px;
        }
        .mobile-viewport::-webkit-scrollbar-track {
            background: transparent;
        }
        .mobile-viewport::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 min-h-screen flex items-center justify-center p-4 perspective-container">

    <!-- Outer Device Hardware Shell -->
    <div class="3d-card relative mx-auto w-[380px] h-[780px] bg-slate-950 rounded-[48px] p-3.5 shadow-[0_25px_60px_rgba(0,0,0,0.8),_inset_0_2px_4px_rgba(255,255,255,0.2)] border border-slate-800/80 hover:scale-[1.02] hover:shadow-[0_35px_70px_rgba(99,102,241,0.25)]">
        
        <!-- Top Speaker Notch and Camera Island Component -->
        <div class="absolute top-6 left-1/2 transform -translate-x-1/2 w-32 h-6 bg-slate-950 rounded-full z-30 flex items-center justify-center gap-1.5 shadow-inner">
            <div class="w-3 h-3 rounded-full bg-slate-900 border border-slate-800 flex items-center justify-center">
                <div class="w-1 h-1 rounded-full bg-indigo-950"></div>
            </div>
            <div class="w-12 h-1 rounded-full bg-slate-800"></div>
        </div>

        <!-- Inner Mobile Screen Viewport Boundary -->
        <div class="mobile-viewport relative w-full h-full bg-white rounded-[36px] overflow-y-auto overflow-x-hidden flex flex-col pt-10 pb-6 px-5 border border-slate-950">
            
            <!-- Header Section with 3D Styled Logo Mark -->
            <div class="text-center mb-6 mt-2">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-gradient-to-tr from-indigo-600 to-violet-500 shadow-[0_6px_15px_rgba(99,102,241,0.3)] mb-3 transition-transform duration-300 hover:rotate-6 hover:scale-105">
                    <!-- Isometric Document Scan Graphic -->
                    <svg class="w-7 h-7 text-white filter drop-shadow-[0_3px_5px_rgba(0,0,0,0.2)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <h1 class="text-xl font-extrabold text-slate-950 tracking-tight">AI Resume Screener</h1>
                <p class="text-xs text-slate-500 mt-1 font-medium">Evaluate compliance & parsing vectors.</p>
            </div>

            <!-- Flash Messaging System -->
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="mb-5 p-3.5 bg-rose-50 border border-rose-100 text-rose-800 text-xs rounded-xl shadow-inner animate-fade-in">
                    {% for message in messages %}
                        <p class="font-semibold flex items-center gap-2">
                            <svg class="w-3.5 h-3.5 text-rose-500 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                            {{ message }}
                        </p>
                    {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <!-- Main Submission Form pointing to /results processing route -->
            <form action="/results" method="POST" enctype="multipart/form-data" class="space-y-5 flex-1 flex flex-col justify-between">
                
                <div class="space-y-5">
                    <!-- Job Description Field Section -->
                    <div class="group">
                        <label for="job_description" class="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5 group-focus-within:text-indigo-600 transition-colors">Target Job Description</label>
                        <textarea 
                            name="job_description" 
                            id="job_description" 
                            rows="4" 
                            placeholder="Paste requirements or expected target keywords here..."
                            class="w-full px-3.5 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 focus:bg-white transition-all resize-none shadow-inner"
                        >{% if request.form.get('job_description') %}{{ request.form.get('job_description') }}{% endif %}</textarea>
                    </div>

                    <!-- Custom Interactive File Upload Component Zone -->
                    <div>
                        <label class="block text-[11px] font-bold uppercase tracking-wider text-slate-600 mb-1.5">Upload Candidate Resume</label>
                        <div class="group/upload relative border-2 border-dashed border-slate-200 rounded-xl hover:border-indigo-500 transition-all duration-300 bg-slate-50/50 hover:bg-indigo-50/20">
                            <input 
                                type="file" 
                                name="resume" 
                                id="resume" 
                                accept=".pdf,.docx,.doc" 
                                required
                                class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
                                onchange="updateFilename(this)"
                            />
                            <div class="p-5 text-center pointer-events-none transition-transform duration-300 group-hover/upload:scale-[1.01]">
                                <!-- 3D Layered Cloud Icon Construct -->
                                <div class="relative w-10 h-10 mx-auto mb-2 filter drop-shadow-[0_6px_10px_rgba(99,102,241,0.25)]">
                                    <svg class="text-indigo-500 w-10 h-10 transition-transform duration-300 group-hover/upload:-translate-y-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                    </svg>
                                </div>
                                <p id="file-label-text" class="text-xs font-semibold text-slate-700 transition-colors group-hover/upload:text-slate-900">
                                    Drop file here, or <span class="text-indigo-600 font-bold underline decoration-2 decoration-indigo-200 group-hover/upload:decoration-indigo-500 transition-all">browse</span>
                                </p>
                                <p class="text-[10px] text-slate-400 mt-1 font-medium">PDF or DOCX up to 10MB</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3D Tactile Action Button pinned toward bottom -->
                <div class="pt-4 mt-auto">
                    <button 
                        type="submit" 
                        class="w-full py-3 px-4 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-bold rounded-xl shadow-[0_4px_12px_rgba(99,102,241,0.35)] hover:shadow-[0_6px_20px_rgba(99,102,241,0.45)] transition-all duration-300 active:scale-[0.97] transform cursor-pointer text-center tracking-wide text-xs"
                    >
                        Run Evaluation Pipeline
                    </button>
                </div>
                
            </form>
            
            <!-- Bottom UI Soft Home Indicator Bar -->
            <div class="w-28 h-1 bg-slate-200 rounded-full mx-auto mt-5 shrink-0"></div>
        </div>
    </div>

    <!-- Interface Script Elements -->
    <script>
        function updateFilename(input) {
            const textDisplay = document.getElementById('file-label-text');
            if (input.files && input.files[0]) {
                textDisplay.innerHTML = `Selected: <span class="text-indigo-600 font-bold break-all">${input.files[0].name}</span>`;
            }
        }
    </script>
</body>
</html>
