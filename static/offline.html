<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - SmartScreen AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="max-w-md space-y-6">
        <!-- Offline Icon -->
        <div class="w-20 h-20 bg-indigo-600/20 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/30">
            <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a4.978 4.978 0 01-1.414-3.536 5 5 0 011.414-3.536m0 0L4.243 4.243M1.5 1.5l21 21" />
            </svg>
        </div>

        <h1 class="text-3xl font-black tracking-tight text-white">You are Offline</h1>
        <p class="text-slate-400 text-sm leading-relaxed">
            SmartScreen AI is unable to connect to the server right now. Please check your internet connection and try again.
        </p>

        <button onclick="window.location.reload()" class="px-6 py-3 bg-gradient-to-r from-indigo-600 to-violet-600 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/20 active:scale-95 transition-transform cursor-pointer">
            Retry Connection
        </button>
    </div>

</body>
</html>
