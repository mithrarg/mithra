<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Resume Screening Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 650px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .card {
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 24px;
            color: #1e293b;
        }
        p.subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #334155;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            box-sizing: border-box;
        }
        textarea {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            resize: vertical;
            background-color: #ffffff;
        }
        textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        button {
            width: 100%;
            background-color: #4f46e5;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #4338ca;
        }
        .flash-message {
            background-color: #fef2f2;
            border: 1px solid #fca5a5;
            color: #b91c1c;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Resume Screening System</h2>
        <p class="subtitle">Upload file candidate profiles to evaluate parsing metrics against requirements matrices.</p>

        <!-- Flash Error Notifications Container -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash-message">⚠ {{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="resume">Target Candidate Document File (PDF or DOCX):</label>
                <input type="file" name="resume" id="resume" accept=".pdf,.docx,.doc" required>
            </div>

            <div class="form-group">
                <label for="job_description">Comparative Target Job Description (Optional Reference Match):</label>
                <textarea name="job_description" id="job_description" rows="6" placeholder="Paste structural text context criteria metrics here to run core metrics comparison overlay..."></textarea>
            </div>

            <button type="submit">Process & Analyze Engine Metrics</button>
        </form>
    </div>

</body>
</html>
